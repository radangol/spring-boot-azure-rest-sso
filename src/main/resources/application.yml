server:
  port: 8080

spring:
  application:
    name: azure-sso-api

  # OAuth2 Client Configuration for Azure AD Login Flow
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${azure.client-id}
            client-secret: ${azure.client-secret}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Azure AD
            authorization-grant-type: authorization_code
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${azure.tenant-id}/v2.0
            authorization-uri: https://login.microsoftonline.com/${azure.tenant-id}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${azure.tenant-id}/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/${azure.tenant-id}/discovery/v2.0/keys
            user-name-attribute: sub

# Azure AD Configuration (can be overridden by environment variables or profiles)
azure:
  tenant-id: ${AZURE_TENANT_ID:your-tenant-id}
  client-id: ${AZURE_CLIENT_ID:your-client-id}
  client-secret: ${AZURE_CLIENT_SECRET:your-client-secret}

# JWT Configuration for custom token generation
app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000  # 24 hours in milliseconds

# Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging configuration
logging:
  level:
    root: INFO
    com.example.azuressoapi: DEBUG
    org.springframework.security: DEBUG
    com.azure.spring: DEBUG
